name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-installer:
    name: Installer — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    # The installer binary detects arch at runtime (process.arch) and downloads
    # the correct drop-local release asset. One binary per OS is enough:
    # macOS x86_64 runs on arm64 via Rosetta; Windows x86_64 runs on arm64 via
    # the built-in emulation layer. Linux x86_64 runs on most servers too.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-15
            platform: mac
            artifact: drop-local-installer-macos

          - name: Linux
            runner: ubuntu-24.04
            platform: linux
            artifact: drop-local-installer-linux

          - name: Windows
            runner: windows-2025
            platform: win
            artifact: drop-local-installer-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install vp
        run: bun add -g vite-plus

      - name: Install dependencies
        working-directory: installer
        run: vp install

      - name: Build installer (Vite + Electrobun)
        working-directory: installer
        run: vp build && bunx electrobun build --env=stable

      - name: Package installer (macOS)
        if: matrix.platform == 'mac'
        working-directory: installer
        run: |
          APP=$(find build -name "*.app" | head -1)
          if [ -z "$APP" ]; then echo "No .app found"; find build -type f | head -20; exit 1; fi
          codesign --deep --force --sign - "$APP" || true
          # .app bundles are directories — must zip to upload; name as .app.zip so intent is clear
          ditto -c -k --keepParent "$APP" "../${{ matrix.artifact }}.app.zip"

      - name: Locate installer binary (Linux)
        if: matrix.platform == 'linux'
        working-directory: installer
        run: |
          BIN=$(find build -maxdepth 6 -type f -executable ! -name "*.so" | head -1)
          if [ -z "$BIN" ]; then echo "No executable found"; exit 1; fi
          cp "$BIN" "../${{ matrix.artifact }}"
          chmod +x "../${{ matrix.artifact }}"

      - name: Locate installer exe (Windows)
        if: matrix.platform == 'win'
        working-directory: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse build -Filter *.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found"; exit 1 }
          Copy-Item $exe.FullName "..\.\${{ matrix.artifact }}.exe"

      - name: Upload installer (macOS .app.zip)
        if: matrix.platform == 'mac'
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: ${{ matrix.artifact }}.app.zip
          generate_release_notes: false

      - name: Upload installer (Linux binary)
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: false

      - name: Upload installer (Windows .exe)
        if: matrix.platform == 'win'
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: ${{ matrix.artifact }}.exe
          generate_release_notes: false

  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — universal binary covers both arm64 + x86_64 via Rosetta
          # For a true native split, Electrobun builds per-runner arch.
          - name: macOS (arm64)
            runner: macos-15        # M-series runner (arm64), GA since 2024
            platform: mac
            arch: arm64
            artifact: drop-local-macos-arm64

          - name: Linux (x86_64)
            runner: ubuntu-24.04
            platform: linux
            arch: x86_64
            artifact: drop-local-linux-x86_64

          - name: Linux (arm64)
            runner: ubuntu-24.04-arm # Native arm64 runner, GA since 2025
            platform: linux
            arch: arm64
            artifact: drop-local-linux-arm64

          - name: Windows (x86_64)
            runner: windows-2025
            platform: win
            arch: x86_64
            artifact: drop-local-windows-x86_64

          - name: Windows (arm64)
            runner: windows-11-arm  # Native arm64 runner, GA since 2025
            platform: win
            arch: arm64
            artifact: drop-local-windows-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install vp
        run: bun add -g vite-plus

      - name: Install dependencies
        run: vp install

      - name: Build frontend (Vite)
        run: vp build

      - name: Build app (Electrobun)
        run: bunx electrobun build --env=stable

      # ── macOS: code sign + notarize (skip if secrets not set) ──────────────
      - name: Sign & notarize (macOS)
        if: matrix.platform == 'mac' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k actions build.keychain
          APP=$(find build -name "*.app" | head -1)
          codesign --deep --force --options runtime \
            --sign "Developer ID Application: $APPLE_TEAM_ID" "$APP"
          ditto -c -k --keepParent "$APP" "${APP%.app}.zip"
          xcrun notarytool submit "${APP%.app}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP"

      # Ad-hoc sign always — prevents "app is damaged" even without notarization
      - name: Ad-hoc sign (macOS)
        if: matrix.platform == 'mac' && env.APPLE_CERTIFICATE == ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          APP=$(find build -name "*.app" | head -1)
          if [ -n "$APP" ]; then
            codesign --deep --force --sign - "$APP"
            echo "Ad-hoc signed: $APP"
          fi

      # ── Locate build output & package into a single archive ────────────────
      - name: Package artifact (macOS)
        if: matrix.platform == 'mac'
        run: |
          APP=$(find build -name "*.app" | head -1)
          if [ -z "$APP" ]; then echo "No .app found"; find build -type f | head -20; exit 1; fi

          ditto -c -k --keepParent $APP "${{ matrix.artifact }}.zip"

      - name: Package artifact (Linux)
        if: matrix.platform == 'linux'
        run: |
          BIN=$(find build -maxdepth 6 -type f -executable ! -name "*.so" ! -name "*.sh" | head -1)
          if [ -z "$BIN" ]; then echo "No executable found"; find build -type f | head -20; exit 1; fi
          cp "$BIN" "${{ matrix.artifact }}"
          chmod +x "${{ matrix.artifact }}"

      - name: Package artifact (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse build -Filter *.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found"; Get-ChildItem -Recurse build | Select-Object -First 20; exit 1 }
          Copy-Item $exe.FullName "${{ matrix.artifact }}.exe"

      # ── Upload to GitHub Release ────────────────────────────────────────────
      - name: Upload release asset (macOS zip)
        if: matrix.platform == 'mac'
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: ${{ matrix.artifact }}.zip
          generate_release_notes: true

      - name: Upload release asset (Linux raw binary)
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true

      - name: Upload release asset (Windows exe)
        if: matrix.platform == 'win'
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: ${{ matrix.artifact }}.exe
          generate_release_notes: true
