name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — universal binary covers both arm64 + x86_64 via Rosetta
          # For a true native split, Electrobun builds per-runner arch.
          - name: macOS (arm64)
            runner: macos-15        # M-series runner (arm64), GA since 2024
            platform: mac
            arch: arm64
            artifact: drop-local-macos-arm64

          - name: Linux (x86_64)
            runner: ubuntu-24.04
            platform: linux
            arch: x86_64
            artifact: drop-local-linux-x86_64

          - name: Linux (arm64)
            runner: ubuntu-24.04-arm # Native arm64 runner, GA since 2025
            platform: linux
            arch: arm64
            artifact: drop-local-linux-arm64

          - name: Windows (x86_64)
            runner: windows-2025
            platform: win
            arch: x86_64
            artifact: drop-local-windows-x86_64

          - name: Windows (arm64)
            runner: windows-11-arm  # Native arm64 runner, GA since 2025
            platform: win
            arch: arm64
            artifact: drop-local-windows-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install vp
        run: npm install -g vite-plus

      - name: Install dependencies
        run: vp install

      - name: Build frontend (Vite)
        run: vp build

      - name: Build app (Electrobun)
        run: bunx electrobun build --env=stable

      # ── macOS: code sign + notarize (skip if secrets not set) ──────────────
      - name: Sign & notarize (macOS)
        if: matrix.platform == 'mac' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k actions build.keychain
          APP=$(find build -name "*.app" | head -1)
          codesign --deep --force --options runtime \
            --sign "Developer ID Application: $APPLE_TEAM_ID" "$APP"
          ditto -c -k --keepParent "$APP" "${APP%.app}.zip"
          xcrun notarytool submit "${APP%.app}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP"

      # Ad-hoc sign always — prevents "app is damaged" even without notarization
      - name: Ad-hoc sign (macOS)
        if: matrix.platform == 'mac' && env.APPLE_CERTIFICATE == ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          APP=$(find build -name "*.app" | head -1)
          if [ -n "$APP" ]; then
            codesign --deep --force --sign - "$APP"
            echo "Ad-hoc signed: $APP"
          fi

      # ── Locate build output & package into a single archive ────────────────
      - name: Package artifact (macOS)
        if: matrix.platform == 'mac'
        run: |
          APP=$(find build -name "*.app" | head -1)
          if [ -z "$APP" ]; then echo "No .app found"; find build -type f | head -20; exit 1; fi

          APP_NAME=$(basename "$APP")

          # Create installer script — user double-clicks this in Finder to clear
          # Gatekeeper quarantine and launch the app. No Apple Developer account needed.
          cat > "Install drop.local.command" <<'EOF'
#!/bin/bash
DIR="$(cd "$(dirname "$0")" && pwd)"
APP_PATH="$DIR/drop-local.app"
if [ ! -d "$APP_PATH" ]; then
  echo "Error: drop-local.app not found next to this script."
  read -p "Press Enter to close..."
  exit 1
fi
echo "Clearing Gatekeeper quarantine..."
xattr -cr "$APP_PATH"
echo "Installing to /Applications..."
cp -R "$APP_PATH" /Applications/
echo "Done. Launching drop.local..."
open /Applications/drop-local.app
EOF
          chmod +x "Install drop.local.command"

          # Stage both into a folder so the zip extracts cleanly
          mkdir -p staging
          cp -R "$APP" staging/
          cp "Install drop.local.command" staging/
          ditto -c -k --keepParent staging "${{ matrix.artifact }}.zip"
          rm -rf staging "Install drop.local.command"

      - name: Package artifact (Linux)
        if: matrix.platform == 'linux'
        run: |
          BIN=$(find build -maxdepth 6 -type f -executable ! -name "*.so" ! -name "*.sh" | head -1)
          if [ -z "$BIN" ]; then echo "No executable found"; find build -type f | head -20; exit 1; fi
          # Tar the entire app directory (binary + sibling .so libs/resources)
          APP_DIR=$(dirname "$BIN")
          tar -czf "${{ matrix.artifact }}.tar.gz" -C "$(dirname "$APP_DIR")" "$(basename "$APP_DIR")"

      - name: Package artifact (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse build -Filter *.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found"; Get-ChildItem -Recurse build | Select-Object -First 20; exit 1 }
          # Zip the entire app directory (exe + sibling DLLs/resources), not just the exe
          $appDir = $exe.DirectoryName
          Compress-Archive -Path "$appDir\*" -DestinationPath "${{ matrix.artifact }}.zip"

      # ── Upload to GitHub Release ────────────────────────────────────────────
      - name: Upload release asset (zip)
        if: matrix.platform == 'mac' || matrix.platform == 'win'
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: ${{ matrix.artifact }}.zip
          generate_release_notes: true

      - name: Upload release asset (tar.gz)
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: ${{ matrix.artifact }}.tar.gz
          generate_release_notes: true
